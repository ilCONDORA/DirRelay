name: dir_relay
description: "DirRelay is a Flutter app for relaying folders and data to a remote server via SSH. Built for automation and self-hosted setups like Immich."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
